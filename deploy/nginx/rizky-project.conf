# /etc/nginx/sites-available/rizky-project
# SATU VPS, EMPAT PERAN — dipisah per server_name:
#   rizky.com + *.rizky.com + custom domain -> Vue static (dist)
#   api.rizky.com                           -> Laravel API
#   admin.rizky.com                         -> Laravel (Filament /admin)
# SSL: wildcard *.rizky.com (DNS-01) + per-custom-domain (add-custom-domain.sh)

# ---------- HTTP -> HTTPS ----------
server {
    listen 80 default_server;
    server_name _;
    location ^~ /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# ---------- API (Laravel) ----------
server {
    listen 443 ssl;
    http2 on;
    server_name api.rizky.com;

    root /var/www/rizky-project-api/current/public;
    index index.php;
    include snippets/rizky-ssl.conf;    # ssl_certificate wildcard + params

    client_max_body_size 20M;

    location / { try_files $uri $uri/ /index.php?$query_string; }
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_HOST $host;
        include fastcgi_params;
    }
    location /storage {
        alias /var/www/rizky-project-api/current/storage/app/public;
        expires 30d; access_log off;
    }
    location ~ /\.(?!well-known) { deny all; }
}

# ---------- ADMIN (Filament, Laravel yang sama) ----------
server {
    listen 443 ssl;
    http2 on;
    server_name admin.rizky.com;

    root /var/www/rizky-project-api/current/public;
    index index.php;
    include snippets/rizky-ssl.conf;

    # (opsional) batasi ke IP kantor/rumah:
    # allow 103.x.x.x; deny all;

    location / { try_files $uri $uri/ /index.php?$query_string; }
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_HOST $host;
        include fastcgi_params;
    }
}

# ---------- WEB (Vue static) — default utk domain lain apa pun ----------
server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;   # rizky.com, *.rizky.com, dan custom domain pelanggan

    root /var/www/rizky-project-web;
    index index.html;
    include snippets/rizky-ssl.conf;

    # SPA fallback: semua path -> index.html (Vue Router yang mengatur)
    location / { try_files $uri /index.html; }

    location ~* \.(js|css|png|jpg|jpeg|webp|svg|woff2?)$ {
        expires 1y; access_log off;
        add_header Cache-Control "public, immutable";
    }
}
