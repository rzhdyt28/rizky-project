<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220">
  <!-- Ornamen modern -- satu garis tipis kontinu membentuk ranting+daun
       minimalis, monokrom, tanpa isian warna (gaya "line art" kekinian). -->
  <g fill="none" stroke="#3A3A3A" stroke-width="1.3" stroke-linecap="round" opacity="0.8">
    <path d="M8 140 Q 50 70 130 20" />
    <path d="M40 100 Q 55 82 78 78" />
    <path d="M62 72 Q 76 56 100 50" />
    <path d="M22 118 Q 34 104 54 100" />
  </g>
  <!-- daun-daun garis tipis (bentuk almond terbuka, bukan solid) -->
  <g fill="none" stroke="#3A3A3A" stroke-width="1.1" opacity="0.65">
    <path d="M78 78 Q 90 68 96 54 Q 88 62 78 78 Z" />
    <path d="M54 100 Q 66 90 70 76 Q 62 84 54 100 Z" />
    <path d="M100 50 Q 112 38 116 24 Q 108 32 100 50 Z" />
  </g>
  <!-- lingkaran kecil sebagai aksen titik akhir -->
  <circle cx="130" cy="20" r="3" fill="#3A3A3A" opacity="0.7" />
  <circle cx="8" cy="140" r="2.5" fill="#3A3A3A" opacity="0.5" />
</svg>
